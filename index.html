
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 AI | منصة شريف سالم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0000ff; --black: #000000; }
        body { background: var(--black); color: #fff; font-family: 'Tajawal', sans-serif; text-align: center; padding: 20px; font-size: 22px; margin: 0; }
        .card { border: 2px solid var(--blue); border-radius: 15px; padding: 25px; background: #121212; max-width: 650px; margin: 20px auto; box-shadow: 0 0 25px rgba(0,0,255,0.4); }
        .status { background: #000; color: #00ff00; padding: 12px; border-radius: 8px; margin: 15px 0; font-family: monospace; font-size: 18px; border: 1px solid #333; }
        select { width: 100%; padding: 15px; border-radius: 10px; background: #000; color: #fff; border: 1px solid var(--blue); font-size: 20px; margin-bottom: 20px; font-family: 'Tajawal'; }
        .post-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; margin-bottom: 25px; overflow: hidden; text-align: right; }
        .post-title { color: #fff; text-decoration: none; font-size: 20px; display: block; padding: 15px; font-weight: bold; }
        .btn-action { background: var(--blue); color: #fff; border: none; padding: 15px; border-radius: 10px; font-size: 20px; cursor: pointer; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color: var(--blue); margin: 0;">Creative 2026 AI</h1>
    <p style="font-size: 16px; color: #888; margin-bottom: 20px;">دعم المحتوى التقني للخبير: شريف سالم</p>
    
    <select id="blogSelect">
        <option value="www.sherifpro.com">⭐ مدونة شريف سالم (تجديد السيارات)</option>
        <option value="ashraf-creative.blogspot.com">Creative 2026 (الرئيسية)</option>
        <option value="optimum2026.blogspot.com">Optimum 2026</option>
        <option value="ashrafhassan2026.blogspot.com">أشرف حسن 2026</option>
    </select>

    <div class="status" id="display">> جاهز لدعم "شريف سالم" في محركات البحث...</div>
    <button class="btn-action" onclick="loadBlogData()">عرض مقالات شريف سالم</button>

    <div id="feed" style="margin-top:30px;"></div>
</div>

<script>
function loadBlogData() {
    const blogUrl = document.getElementById('blogSelect').value;
    const script = document.createElement('script');
    script.src = `https://${blogUrl}/feeds/posts/default?alt=json-in-script&callback=renderPosts&max-results=6`;
    document.body.appendChild(script);
}

function renderPosts(data) {
    const feed = document.getElementById('feed');
    feed.innerHTML = "";
    data.feed.entry.forEach(entry => {
        const title = entry.title.$t;
        const link = entry.link.find(l => l.rel === 'alternate').href;
        
        const card = document.createElement('div');
        card.className = "post-card";
        card.innerHTML = `
            <div class="post-content">
                <span class="post-title">⚡ ${title}</span>
                <p style="font-size:14px; color:var(--blue); padding:0 15px;">بواسطة: شريف سالم</p>
                <button class="btn-action" style="background:#000; border:1px solid var(--blue); margin-bottom:10px;" onclick="window.open('${link}')">معاينة المقال ودعم الـ SEO</button>
            </div>
        `;
        feed.appendChild(card);
    });
}
</script>

</body>
</html>
