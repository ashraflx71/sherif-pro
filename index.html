<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sherif Pro | Back To Zero</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        /* الهيدر واللوجو */
        .main-header { 
            background: #000; 
            border-bottom: 3px solid #d4af37; 
            padding: 15px 0; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .logo-box img { max-height: 120px; width: auto; display: block; margin: 0 auto; }

        /* السلايدر */
        .comparison-section { padding: 40px 0; text-align: center; }
        .section-title { color: #d4af37; margin-bottom: 25px; font-size: 26px; font-weight: bold; }
        
        .comparison-container {
            position: relative; width: 95%; max-width: 900px; height: 500px;
            margin: 0 auto; overflow: hidden; border: 4px solid #d4af37; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* استخدام أسماء الملفات مباشرة كما هي في GitHub */
        .img-after { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('after.jpg'); background-size: cover; background-position: center; 
        }
        .img-before { 
            position: absolute; top: 0; left: 0; width: 50%; height: 100%;
            background-image: url('before.jpg'); background-size: cover; background-position: center;
            border-right: 4px solid #d4af37; z-index: 2;
        }

        .slider-input {
            position: absolute; -webkit-appearance: none; appearance: none;
            width: 100%; height: 100%; background: transparent; outline: none;
            margin: 0; cursor: ew-resize; z-index: 10;
        }

        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none; width: 50px; height: 500px; /* مقبض طويل يسهل سحبه */
            background: rgba(212, 175, 55, 0.3); border-left: 2px solid #d4af37;
        }

        .label { position: absolute; top: 20px; background: rgba(0,0,0,0.8); color: #d4af37; padding: 8px 20px; border-radius: 5px; font-weight: bold; z-index: 5; }
        .label-before { left: 20px; }
        .label-after { right: 20px; }

        @media (max-width: 768px) { .comparison-container { height: 350px; } .logo-box img { max-height: 80px; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo-box">
            <img src="logo.png" alt="Sherif Pro - Back To Zero">
        </div>
    </header>

    <section class="comparison-section">
        <h2 class="section-title">إعادة إحياء بريق السيارات</h2>
        <div class="comparison-container">
            <div class="img-after"><span class="label label-after">بعد</span></div>
            <div id="before-box" class="img-before"><span class="label label-before">قبل</span></div>
            <input type="range" min="0" max="100" value="50" class="slider-input" id="range-slider">
        </div>
    </section>

    <script>
        const slider = document.getElementById('range-slider');
        const beforeBox = document.getElementById('before-box');
        slider.addEventListener('input', (e) => {
            beforeBox.style.width = e.target.value + '%';
        });
    </script>

</body>
</html>
