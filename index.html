<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sherif Pro | Back To Zero - سمكرة وتلميع سيارات بالاسكندرية</title>
    <style>
        /* التنسيق الملكي: أسود وذهبي */
        :root { --gold: #d4af37; --dark: #000; --card: #111; }
        body { margin: 0; background-color: var(--dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        /* هيدر فخم */
        .main-header { background: var(--dark); border-bottom: 3px solid var(--gold); padding: 20px 0; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .logo-box img { max-height: 160px; border-radius: 15px; border: 2px solid var(--gold); transition: 0.3s; }
        .logo-box img:hover { transform: scale(1.05); }

        /* سلايدر "قبل وبعد" */
        .comp-section { padding: 60px 0; text-align: center; }
        .comp-title { color: var(--gold); font-size: 32px; margin-bottom: 30px; font-weight: bold; }
        .comp-container {
            position: relative; width: 100%; max-width: 850px; height: 500px;
            margin: 0 auto; overflow: hidden; border: 4px solid var(--gold); border-radius: 20px;
            box-shadow: 0 10px 40px rgba(212,175,55,0.2);
        }
        .img-after { position: absolute; top:0; left:0; width:100%; height:100%; background-image: url('after.jpg'); background-size: cover; background-position: center; }
        .img-before { position: absolute; top:0; left:0; width:50%; height:100%; background-image: url('before.jpg'); background-size: cover; background-position: center; border-right: 4px solid var(--gold); z-index: 2; }
        .slider-input { position: absolute; -webkit-appearance: none; width: 100%; height: 100%; background: transparent; cursor: ew-resize; z-index: 10; margin: 0; outline: none; }
        .slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 45px; height: 500px; background: rgba(212,175,55,0.25); border-left: 3px solid var(--gold); }

        /* معرض الصور Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding-bottom: 60px; }
        .gallery-item { position: relative; overflow: hidden; border-radius: 15px; border: 1px solid #333; height: 250px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .gallery-item:hover img { transform: scale(1.1); filter: brightness(1.2); }
        .gallery-overlay { position: absolute; bottom: 0; background: rgba(0,0,0,0.7); color: var(--gold); width: 100%; padding: 10px; font-weight: bold; opacity: 0; transition: 0.3s; text-align: center; }
        .gallery-item:hover .gallery-overlay { opacity: 1; }

        /* خدمات واتصال */
        .cta-box { background: var(--card); padding: 50px; border-radius: 30px; text-align: center; border: 1px solid var(--gold); margin-bottom: 60px; }
        .btn-wa { display: inline-block; padding: 18px 50px; background: var(--gold); color: #000; text-decoration: none; font-weight: bold; border-radius: 60px; font-size: 20px; transition: 0.4s; box-shadow: 0 5px 20px rgba(212,175,55,0.4); }
        .btn-wa:hover { background: #fff; transform: translateY(-5px); box-shadow: 0 8px 25px rgba(255,255,255,0.3); }

        @media (max-width: 768px) { .comp-container { height: 300px; } .logo-box img { max-height: 110px; } .comp-title { font-size: 24px; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo-box">
            <img src="logo.jpg" alt="Sherif Pro - Back To Zero">
        </div>
    </header>

    <div class="container">
        <section class="comp-section">
            <h2 class="comp-title">سحر التحول: Back To Zero</h2>
            <p style="color: #aaa; margin-bottom: 20px;">اسحب الشريط لرؤية دقة العمل قبل وبعد</p>
            <div class="comp-container">
                <div class="img-after"></div>
                <div id="before-box" class="img-before"></div>
                <input type="range" min="0" max="100" value="50" class="slider-input" id="range-slider">
            </div>
        </section>

        <h2 class="comp-title" style="text-align: center;">معرض أعمالنا الفنية</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="g1.jpg"><div class="gallery-overlay">سمكرة احترافية</div></div>
            <div class="gallery-item"><img src="g2.jpg"><div class="gallery-overlay">لمعة فابريكا</div></div>
            <div class="gallery-item"><img src="g3.jpg"><div class="gallery-overlay">إصلاح مريات</div></div>
            <div class="gallery-item"><img src="g4.jpg"><div class="gallery-overlay">تجديد شامل</div></div>
            <div class="gallery-item"><img src="g5.jpg"><div class="gallery-overlay">دقة التفاصيل</div></div>
            <div class="gallery-item"><img src="g6.jpg"><div class="gallery-overlay">إعادة إحياء</div></div>
            <div class="gallery-item"><img src="g7.jpg"><div class="gallery-overlay">إكصدمات</div></div>
        </div>

        <div class="cta-box">
            <h2 style="color: var(--gold); margin-bottom: 10px;">مركز شريف برو - Sherif Pro</h2>
            <p style="font-size: 18px; color: #ccc;">الإسكندرية - الهانوفيل - العجمي</p>
            <p style="margin-bottom: 30px; font-weight: bold;">سمكرة • تلميع • إصلاح إكصدمات ومرايات</p>
            <a href="https://wa.me/201227302325" class="btn-wa">احجز موعدك الآن عبر واتساب</a>
        </div>
    </div>

    <script>
        const slider = document.getElementById('range-slider');
        const beforeBox = document.getElementById('before-box');
        slider.addEventListener('input', (e) => {
            beforeBox.style.width = e.target.value + '%';
        });
    </script>
</body>
</html>
