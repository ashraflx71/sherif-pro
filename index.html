<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sherif Pro | Back To Zero - سمكرة وتلميع سيارات</title>
    <style>
        /* التنسيق الفخم - أسود وذهبي */
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .gold { color: #d4af37; }

        /* الهيدر واللوجو */
        .main-header { background: #000; border-bottom: 3px solid #d4af37; padding: 20px 0; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .logo-box img { max-height: 150px; border-radius: 15px; border: 2px solid #d4af37; }

        /* سلايدر قبل وبعد */
        .comp-section { padding: 40px 0; text-align: center; }
        .comp-container {
            position: relative; width: 100%; max-width: 800px; height: 450px;
            margin: 0 auto; overflow: hidden; border: 3px solid #d4af37; border-radius: 15px;
        }
        .img-after { position: absolute; top:0; left:0; width:100%; height:100%; background-image: url('after.jpg'); background-size: cover; background-position: center; }
        .img-before { position: absolute; top:0; left:0; width:50%; height:100%; background-image: url('before.jpg'); background-size: cover; background-position: center; border-right: 3px solid #d4af37; z-index: 2; }
        .slider-input { position: absolute; -webkit-appearance: none; width: 100%; height: 100%; background: transparent; cursor: ew-resize; z-index: 10; margin: 0; outline: none; }
        .slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 40px; height: 450px; background: rgba(212,175,55,0.2); border-left: 2px solid #d4af37; }

        /* معرض الصور Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 30px 0; }
        .gallery-item img { width: 100%; height: 230px; object-fit: cover; border-radius: 12px; border: 2px solid #333; transition: 0.3s; }
        .gallery-item img:hover { border-color: #d4af37; transform: scale(1.02); }

        /* الأزرار والمعلومات */
        .cta-box { text-align: center; padding: 40px 0; background: #111; border-radius: 20px; margin: 20px 0; }
        .btn-wa { display: inline-block; padding: 15px 40px; background: #d4af37; color: #000; text-decoration: none; font-weight: bold; border-radius: 50px; font-size: 18px; }
        
        @media (max-width: 768px) { .comp-container { height: 280px; } .logo-box img { max-height: 100px; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo-box">
            <img src="logo.jpg" alt="Sherif Pro">
        </div>
    </header>

    <div class="container">
        <section class="comp-section">
            <h2 class="gold">خدمة Back To Zero</h2>
            <p>إعادة إحياء بريق السيارات - شاهد الفرق بنفسك</p>
            <div class="comp-container">
                <div class="img-after"></div>
                <div id="before-box" class="img-before"></div>
                <input type="range" min="0" max="100" value="50" class="slider-input" id="range-slider">
            </div>
        </section>

        <h2 class="gold" style="text-align: center;">من أعمالنا في الإسكندرية</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="g1.jpg"></div>
            <div class="gallery-item"><img src="g2.jpg"></div>
            <div class="gallery-item"><img src="g3.jpg"></div>
            <div class="gallery-item"><img src="g4.jpg"></div>
            <div class="gallery-item"><img src="g5.jpg"></div>
            <div class="gallery-item"><img src="g6.jpg"></div>
        </div>

        <div class="cta-box">
            <h3 class="gold">سمكرة • تلميع • إصلاح إكصدمات • مريات</h3>
            <p>الهانوفيل - العجمي - الإسكندرية</p>
            <a href="https://wa.me/201227302325" class="btn-wa">احجز موعدك الآن (واتساب)</a>
        </div>
    </div>

    <script>
        const slider = document.getElementById('range-slider');
        const beforeBox = document.getElementById('before-box');
        slider.addEventListener('input', (e) => {
            beforeBox.style.width = e.target.value + '%';
        });
    </script>
</body>
</html>
