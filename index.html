<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 AI | محرك سكريبتات شريف سالم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0000ff; --black: #000000; }
        body { background: var(--black); color: #fff; font-family: 'Tajawal', sans-serif; text-align: center; padding: 20px; font-size: 22px; margin: 0; }
        .card { border: 2px solid var(--blue); border-radius: 15px; padding: 25px; background: #121212; max-width: 650px; margin: 20px auto; }
        .status { background: #000; color: #00ff00; padding: 12px; border-radius: 8px; margin: 15px 0; font-family: monospace; font-size: 18px; border: 1px solid #333; }
        select { width: 100%; padding: 15px; border-radius: 10px; background: #000; color: #fff; border: 1px solid var(--blue); font-size: 20px; margin-bottom: 20px; font-family: 'Tajawal'; }
        .post-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; margin-bottom: 25px; overflow: hidden; text-align: right; }
        .post-content { padding: 20px; }
        .script-area { background: #000; color: #00ff00; padding: 15px; border-radius: 8px; font-size: 18px; margin-top: 15px; display: none; text-align: right; border: 1px dashed var(--blue); white-space: pre-line; }
        .btn-action { background: var(--blue); color: #fff; border: none; padding: 15px; border-radius: 10px; font-size: 20px; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color: var(--blue); margin: 0;">Creative 2026 AI</h1>
    <p style="font-size: 16px; color: #888;">محرك سكريبتات الفيديو | شريف سالم</p>
    
    <select id="blogSelect">
        <option value="www.sherifpro.com">⭐ مقالات شريف سالم (تجديد السيارات)</option>
        <option value="ashraf-creative.blogspot.com">Creative 2026 (الرئيسية)</option>
    </select>

    <div class="status" id="display">> المحرك جاهز لصياغة المحتوى...</div>
    <button class="btn-action" onclick="loadBlogData()">جلب مقالات شريف سالم</button>

    <div id="feed" style="margin-top:30px;"></div>
</div>

<script>
function loadBlogData() {
    const blogUrl = document.getElementById('blogSelect').value;
    const script = document.createElement('script');
    script.src = `https://${blogUrl}/feeds/posts/default?alt=json-in-script&callback=renderPosts&max-results=5`;
    document.body.appendChild(script);
}

function renderPosts(data) {
    const feed = document.getElementById('feed');
    feed.innerHTML = "";
    data.feed.entry.forEach((entry, index) => {
        const title = entry.title.$t;
        const card = document.createElement('div');
        card.className = "post-card";
        card.innerHTML = `
            <div class="post-content">
                <span style="color:#fff; font-weight:bold;">⚡ ${title}</span>
                <button class="btn-action" onclick="generateScript('${title}', ${index})">توليد سكريبت فيديو "شريف سالم" 🎬</button>
                <div id="script-${index}" class="script-area"></div>
            </div>
        `;
        feed.appendChild(card);
    });
}

function generateScript(title, id) {
    const scriptDiv = document.getElementById(`script-${id}`);
    const display = document.getElementById('display');
    
    const scriptText = `🎥 **سكريبت فيديو Shorts (بصوت شريف سالم):**
    
    1️⃣ **البداية (Hook):** "عارف ليه عربيتك ممكن ترجع زيرو تاني؟ السر مش في قطع الغيار.. السر في الفن!"
    
    2️⃣ **الموضوع:** "أنا شريف سالم، والنهاردة هنتكلم عن موضوع ${title}. في خطوات بسيطة هقولك إزاي بنهتم بكل تفصيلة عشان نوصل لأعلى جودة."
    
    3️⃣ **النهاية (CTA):** "لو عايز تعرف أكتر عن تجديد العربيات، تابعني هنا أو زور موقعي الرسمي. شريف سالم.. فن إعادة السيارات للحياة!"
    
    📌 *نصيحة SEO: استخدم هذا النص في وصف الفيديو على يوتيوب.*`;

    scriptDiv.innerText = scriptText;
    scriptDiv.style.display = "block";
    display.innerText = "> تم توليد السكريبت بنجاح!";
}
</script>

</body>
</html>
